<div class="jump-vis-bali-scales" id="{{ container_id }}-bali-scales" style="display:none;">
  <div class="jump-vis-bali-scale">
    <span class="jump-vis-bali-scale-label">Tokens/s</span>
    <span class="jump-vis-bali-scale-min" id="{{ container_id }}-bali-tps-min">0</span>
    <div class="jump-vis-bali-scale-bar jump-vis-bali-scale-bar--tokens"></div>
    <span class="jump-vis-bali-scale-max" id="{{ container_id }}-bali-tps-max">0</span>

  <div class="jump-vis-bali-scale">
    <span class="jump-vis-bali-scale-label">Tokens/J</span>

    <div class="jump-vis-bali-scale-bar jump-vis-bali-scale-bar--energy"></div>
