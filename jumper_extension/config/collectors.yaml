collectors:
  # Must remain first in config: _process_backend hardcodes pipeline[0];
  process:
    _target_: jumper_extension.monitor.metrics.process.psutil.PsutilProcessCollector
    inject: [pid, process, uid, slurm_job]
    handler:
      _target_: jumper_extension.monitor.metrics.handlers.NoOpHandler

  cpu:
    _target_: jumper_extension.monitor.metrics.cpu.psutil.PsutilCpuCollector
    inject: [node_info]
    handler:
      _target_: jumper_extension.monitor.metrics.handlers.PerDeviceAggregateHandler
      prefix: cpu_util_

  memory:
    _target_: jumper_extension.monitor.metrics.memory.psutil.PsutilMemoryCollector
    inject: [node_info]
    handler:
      _target_: jumper_extension.monitor.metrics.handlers.ScalarHandler
      column: memory

  gpu:
    _target_: jumper_extension.monitor.metrics.gpu.common.MultiGpuCollector
    inject: [uid, slurm_job]
    handler:
      _target_: jumper_extension.monitor.metrics.handlers.PerDeviceMultiAggregateHandler
      prefix: gpu_
      metrics: [util, band, mem]

  io:
    _target_: jumper_extension.monitor.metrics.io.psutil.PsutilIoCollector
    inject: []
    handler:
      _target_: jumper_extension.monitor.metrics.handlers.CumulativeRateHandler
      columns: [io_read_count, io_write_count, io_read, io_write]

  network:
    _target_: jumper_extension.monitor.metrics.network.psutil.PsutilNetworkCollector
    inject: []
    handler:
      _target_: jumper_extension.monitor.metrics.handlers.CumulativeRateHandler
      columns: [net_bytes_sent, net_bytes_recv, net_packets_sent, net_packets_recv]
